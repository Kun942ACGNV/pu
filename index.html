<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾分類手機App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Arial', sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        #video {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid #007bff;
            border-radius: 10px;
        }
        #canvas {
            display: none;
        }
        .btn-custom {
            margin: 10px 0;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .loading {
            text-align: center;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">垃圾分類手機App</h1>
        
        <div class="text-center">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="text-center">
            <button id="startCamera" class="btn btn-primary btn-custom">啟動攝影機</button>
            <button id="capture" class="btn btn-success btn-custom" disabled>拍攝照片</button>
            <button id="classify" class="btn btn-warning btn-custom" disabled>分類</button>
        </div>
        
        <div id="result" class="text-center" style="display: none;">
            <h3>分類結果</h3>
            <p id="prediction"></p>
            <div id="confidence"></div>
        </div>
        
        <div id="loading" class="loading">
            載入模型中...
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
