<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>垃圾分類手機App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #eef6ff 0%, #f8fbff 100%);
            font-family: 'Noto Sans TC', 'Arial', sans-serif;
            color: #1f2937;
        }
        .app-shell {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px 32px;
        }
        .app-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            background: #ffffff;
        }
        .hero-title {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .hero-subtitle {
            color: #4b5563;
        }
        #video {
            width: 100%;
            max-height: 420px;
            border-radius: 22px;
            background-color: #000;
            object-fit: cover;
        }
        #previewImage {
            width: 100%;
            border-radius: 20px;
            object-fit: cover;
        }
        .control-buttons .btn {
            min-width: 110px;
        }
        #statusBadge {
            letter-spacing: 0.03em;
        }
        #result {
            display: none;
        }
        .category-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 4px 6px 4px 0;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(59, 130, 246, 0.12);
            color: #1d4ed8;
            font-size: 0.95rem;
        }
        .guide-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="card app-card p-4 mb-4">
            <div class="d-flex align-items-start gap-3 mb-3">
                <div class="flex-grow-1">
                    <h1 class="hero-title mb-2">垃圾分類助手</h1>
                    <p class="hero-subtitle mb-0">用手機攝影機拍照，就能快速辨識紙板、紙張、生物、垃圾和衣服。</p>
                </div>
                <div class="badge bg-primary text-white py-2 px-3" id="statusBadge">載入模型中...</div>
            </div>

            <div class="ratio ratio-4x3 mb-3">
                <video id="video" autoplay playsinline muted></video>
            </div>

            <div class="d-grid gap-2 control-buttons mb-3">
                <button id="startCamera" class="btn btn-primary btn-lg" disabled><i class="bi bi-camera-video me-2"></i>啟動攝影機</button>
                <button id="capture" class="btn btn-success btn-lg" disabled><i class="bi bi-camera-fill me-2"></i>拍攝照片</button>
                <button id="classify" class="btn btn-warning btn-lg text-white" disabled><i class="bi bi-clipboard-check me-2"></i>開始分類</button>
            </div>

            <div class="text-center mb-3">
                <img id="previewImage" alt="拍攝預覽" style="display:none;" />
            </div>

            <div id="result" class="card guide-card p-3">
                <div class="mb-2">
                    <h2 class="h5 mb-1">分類結果</h2>
                    <p id="prediction" class="fs-5 mb-2"></p>
                </div>
                <div id="confidence"></div>
            </div>
        </div>

        <div class="card guide-card p-4">
            <h3 class="h6 text-secondary mb-3">操作提示</h3>
            <p class="mb-3">請將拍攝物品置於畫面中央，使用明亮環境可提高辨識準確度。</p>
            <div>
                <span class="category-tag">💠 cardboard / 紙板</span>
                <span class="category-tag">💠 paper / 紙張</span>
                <span class="category-tag">💠 biological / 生物</span>
                <span class="category-tag">💠 trash / 垃圾</span>
                <span class="category-tag">💠 clothes / 衣服</span>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
